<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERODYNE // COMMAND_DECK</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00d2ff;
            --dark-bg: #020205;
            --panel-bg: rgba(11, 16, 21, 0.6);
            --border-color: rgba(0, 210, 255, 0.25);
            --font-main: 'Rajdhani', sans-serif;
            --font-mono: 'Fira+Code', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            /* Subtle star-field effect */
            background-image: 
                radial-gradient(circle at center, rgba(0, 210, 255, 0.05) 0%, transparent 70%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            color: white;
            font-family: var(--font-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }

        /* Tactical Glass Panels */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid var(--border-color);
            position: absolute;
            z-index: 10;
        }

        /* Profile Left HUD */
        .profile-hud {
            top: 30px;
            left: 30px;
            width: 320px;
            padding: 20px;
        }

        /* Fleet Right HUD */
        .fleet-hud {
            top: 30px;
            right: 30px;
            width: 280px;
            padding: 20px;
        }

        .avatar-frame {
            border: 1px solid var(--cyan);
            padding: 4px;
            position: relative;
            width: 65px;
            height: 65px;
        }

        .corner-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--cyan);
        }

        /* Center Display */
        .center-console {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .glitch-text {
            font-size: 5rem;
            letter-spacing: 20px;
            margin: 0;
            font-weight: 700;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .stat-box {
            display: flex;
            gap: 60px;
            justify-content: center;
            margin-top: 20px;
        }

        .stat-item h2 {
            color: var(--cyan);
            font-size: 2rem;
            margin: 0;
        }

        .stat-item span {
            font-size: 0.75rem;
            letter-spacing: 3px;
            opacity: 0.5;
        }

        /* Footer System Pulse */
        .footer-pulse {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            background: rgba(0,0,0,0.8);
            border-top: 0.5px solid var(--border-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .signal-bar {
            color: var(--cyan);
            font-weight: bold;
        }

        /* Utility */
        .cyan-text { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="glass-panel profile-hud">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="avatar-frame">
                <div class="corner-dot" style="top:-2px; left:-2px;"></div>
                <div class="corner-dot" style="top:-2px; right:-2px;"></div>
                <img src="https://via.placeholder.com/60" alt="Aeron" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
            </div>
            <div>
                <h2 style="margin: 0; font-size: 1.6rem; letter-spacing: 2px;">AERON</h2>
                <div style="font-family: var(--font-mono); font-size: 0.65rem; color: var(--cyan);">LEAD_ARCHITECT // OMNI</div>
            </div>
        </div>
        
        <div style="margin-top: 20px; border-top: 0.5px solid var(--border-color); padding-top: 15px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.65rem; font-family: var(--font-mono); margin-bottom: 5px;">
                <span>STABILITY</span>
                <span>99.9%</span>
            </div>
            <div style="width: 100%; height: 2px; background: rgba(255,255,255,0.1);">
                <div style="width: 99%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan);"></div>
            </div>
        </div>
    </div>

    <div class="glass-panel fleet-hud">
        <h3 style="font-size: 0.8rem; margin: 0 0 15px 0; letter-spacing: 2px; color: var(--cyan);">[ ACTIVE_UNITS ]</h3>
        <div style="font-family: var(--font-mono); font-size: 0.75rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span>STATION_ALPHA</span>
                <span class="signal-bar">[|||||]</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span>STATION_BETA</span>
                <span class="signal-bar">[||||.]</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>STATION_GAMMA</span>
                <span class="signal-bar">[||...]</span>
            </div>
        </div>
    </div>

    <div class="center-console">
        <h1 class="glitch-text">AERODYNE</h1>
        <div class="stat-box">
            <div class="stat-item">
                <h2>100+</h2>
                <span>STATIONS</span>
            </div>
            <div class="stat-item">
                <h2>150K+</h2>
                <span>SUBJECTS</span>
            </div>
        </div>
    </div>

    <div class="footer-pulse">
        <div>
            <span class="status-dot"></span>
            <span>SYSTEM_STATUS: OPERATIONAL</span>
        </div>
        <div style="opacity: 0.4;">[LOG]: DATA_SYNC_SUCCESSFUL // ENCRYPTED_LINK_ACTIVE</div>
        <div style="letter-spacing: 2px;">
            <span class="cyan-text">LOC:</span> LUNAR_ORBIT
        </div>
    </div>

</body>
</html>
